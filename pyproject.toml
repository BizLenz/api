[project]
name = "api"
version = "0.1.0"
description = "BackEnd project"
requires-python = ">=3.11"

dependencies = [
    "pytest>=7.0.0",
    "httpx",
    "pytest-asyncio"
    # 필요한 패키지 추가
]

[tool.uv]  # uv 사용 시 필요

[tool.ruff]
line-length = 88
target-version = "py311"
include = ["src/**/*.py", "tests/**/*.py"]
exclude = ["venv", "__pycache__"]