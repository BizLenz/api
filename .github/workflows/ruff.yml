name: CI

on:
  push:
    branches: [ "main", "feature/**" ]      # ✅ 수정됨: feature → main, feature/** 로 확장
  pull_request:
    branches: [ "main", "feature/**" ]      # ✅ 수정됨: PR 대상도 main 포함
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.11 with uv
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: Create .env file               # ✅ 추가됨: GitHub Secret 기반으로 .env 파일 생성
        run: echo "${{ secrets.ENV_FILE }}" | tr '\n' '\n' > .env

      - name: Install uv audit
        run: uv pip install uv-audit

      - name: Ruff Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github .

      - name: Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check .

      - name: Run uv audit
        run: uv run uv-audit

      - name: Run Pytest
        run: uv run pytest

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .
